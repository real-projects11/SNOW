<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pick his name — Snow's Family</title>

<!-- ADSTERRA — Popunder script goes here -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="bar">
  <div class="mark">
    <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-7-9.5A4 4 0 0 1 12 8a4 4 0 0 1 7 3.5C19 16.5 12 21 12 21z"/></svg>
  </div>
  <div class="brand"><b>Snow's Family</b><span>Love · Follow · Collect</span></div>
</header>

<section style="padding-top:14px">
  <div class="wrap">
    <p class="eyebrow">One vote each</p>
    <h2>Which name does he carry?</h2>
    <p class="lede" style="margin-top:10px">Tap the one that fits him.</p>

    <div class="placards" id="placards">
      <button class="placard" aria-pressed="false" data-name="Shadow">
        <span class="hole"></span>
        <span>
          <span class="name">Shadow</span>
          <span class="why">Where Snow goes, he follows. Always one step behind.</span>
        </span>
      </button>

      <button class="placard" aria-pressed="false" data-name="Bruno">
        <span class="hole"></span>
        <span>
          <span class="name">Bruno</span>
          <span class="why">Solid, warm, a little stubborn. The one who shares his food.</span>
        </span>
      </button>

      <button class="placard" aria-pressed="false" data-name="Kobi">
        <span class="hole"></span>
        <span>
          <span class="name">Kobi</span>
          <span class="why">Small name for a small brother who never stops moving.</span>
        </span>
      </button>
    </div>

    <button class="btn" id="submit" disabled style="margin-top:26px">Lock in my vote</button>
    <p class="note" id="note">Pick a name to continue.</p>

    <div class="disclose">
      <b>Before you vote:</b> Snow and his family are characters created with AI. The name you choose is real — we'll use it in every video from now on.
    </div>
  </div>
</section>

<footer><p><b>Snow's Family</b></p></footer>

<script>
/* ===== CONFIG =====
   Point this at your Vercel endpoint (the same pattern as tarot-mp-backend).
   It should accept { type, name } and store the tally + ping your Telegram bot.
   Never put a Telegram bot token in this file — it's public. Keep it server-side. */
const ENDPOINT = ""; // e.g. "https://snow-backend.vercel.app/api/vote"

const cards  = document.querySelectorAll(".placard");
const submit = document.getElementById("submit");
const note   = document.getElementById("note");
let picked = null;

cards.forEach(card => {
  card.addEventListener("click", () => {
    cards.forEach(c => c.setAttribute("aria-pressed", "false"));
    card.setAttribute("aria-pressed", "true");
    picked = card.dataset.name;
    submit.disabled = false;
    note.textContent = `You picked ${picked}.`;
  });
});

submit.addEventListener("click", async () => {
  if (!picked) return;
  submit.disabled = true;
  submit.textContent = "Locking it in…";

  localStorage.setItem("snow_vote", picked);

  if (ENDPOINT) {
    try {
      await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "vote", name: picked })
      });
    } catch (e) { /* vote still counts locally — don't block the user */ }
  }

  location.href = "result.html";
});
</script>

<!-- ADSTERRA — Social Bar script goes here -->

</body>
</html>
